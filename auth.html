<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Web Studio - Connexion</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container { max-width: 400px; margin: 100px auto; padding: 30px; background: #2d2d2d; border-radius: 12px; text-align: center; border: 1px solid #444; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #1e1e1e; border: 1px solid #555; color: white; border-radius: 5px; }
        .auth-btn { width: 100%; padding: 12px; margin: 10px 0; cursor: pointer; border-radius: 5px; font-weight: bold; border: none; }
        .btn-google { background: white; color: #444; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-submit { background: #0078d4; color: white; }
        .toggle-link { color: #00a2ff; cursor: pointer; font-size: 0.9em; }
    </style>
</head>
<body class="studio-root">
    <div class="auth-container">
        <h1>Web Studio</h1>
        <p id="auth-title">Connexion</p>
        
        <button class="auth-btn btn-google" id="google-login">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="18">
            Continuer avec Google
        </button>

        <div style="margin: 20px 0; color: #888;">OU</div>

        <input type="email" id="email" class="auth-input" placeholder="Email">
        <input type="password" id="password" class="auth-input" placeholder="Mot de passe">
        <button class="auth-btn btn-submit" id="email-action">Se connecter</button>
        
        <p class="toggle-link" id="toggle-auth">Pas de compte ? S'inscrire</p>
    </div>

    <script type="module">
        import { auth } from "./firebase-config.js";
        import { signInWithPopup, GoogleAuthProvider, signInWithEmailAndPassword, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const provider = new GoogleAuthProvider();
        let isLogin = true;

        // Connexion Google
        document.getElementById('google-login').onclick = async () => {
            try {
                await signInWithPopup(auth, provider);
                window.location.href = "index.html";
            } catch (e) { alert(e.message); }
        };

        // Connexion / Inscription Email
        document.getElementById('email-action').onclick = async () => {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            try {
                if (isLogin) await signInWithEmailAndPassword(auth, email, pass);
                else await createUserWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html";
            } catch (e) { alert(e.message); }
        };

        // Switch entre login et signup
        document.getElementById('toggle-auth').onclick = () => {
            isLogin = !isLogin;
            document.getElementById('auth-title').innerText = isLogin ? "Connexion" : "Inscription";
            document.getElementById('email-action').innerText = isLogin ? "Se connecter" : "Créer un compte";
            document.getElementById('toggle-auth').innerText = isLogin ? "Pas de compte ? S'inscrire" : "Déjà un compte ? Se connecter";
        };
    </script>
</body>
</html>
