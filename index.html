<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Web Studio v0.4 - Transform</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="studio-root">
    <div class="toolbar">
        <button class="tool-btn active" id="btn-translate" onclick="window.setMode('translate')">Move</button>
        <button class="tool-btn" id="btn-rotate" onclick="window.setMode('rotate')">Rotate</button>
        <button class="tool-btn" id="btn-scale" onclick="window.setMode('scale')">Scale</button>
        
        <div class="separator"></div>

        <select id="shape-selector" class="tool-select">
            <option value="box">Block</option>
            <option value="sphere">Sphere</option>
            <option value="cylinder">Cylinder</option>
        </select>
        
        <button class="tool-btn" onclick="window.addPart()">Part</button>
        
        <div style="flex-grow: 1;"></div> 
        <button class="menu-toggle" onclick="document.getElementById('right-sidebar').classList.toggle('active')">☰ Explorer</button>
    </div>

    <div class="main-content">
        <div id="viewport">
            <div class="version-tag">Studio Editor v0.4 - Transform Controls</div>
        </div>

        <aside class="sidebar" id="right-sidebar">
            <div class="panel-header">Explorer</div>
            <div class="panel-content" id="explorer-tree">
                <div class="tree-item root">▼ Workspace</div>
            </div>

            <div class="panel-header">Properties</div>
            <div class="panel-content" id="properties-panel">
                <p class="empty-msg">Aucun objet sélectionné</p>
            </div>
        </aside>
    </div>
</div>

<script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
      }
    }
</script>
<script type="module" src="main.js"></script>
</body>
</html>
