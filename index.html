<!DOCTYPE html>
<html>
<head>
    <title>Web Studio Alpha</title>
    <style>
        :root { --panel-bg: #2d2d2d; --border: #1a1a1a; --text: #e0e0e0; }
        body { margin: 0; display: flex; height: 100vh; background: #111; color: var(--text); font-family: 'Segoe UI', sans-serif; }
        
        /* Barre du haut */
        #toolbar { position: absolute; top: 0; width: 100%; height: 40px; background: var(--panel-bg); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 10px; z-index: 100; }
        
        /* Zone 3D */
        #viewport { flex-grow: 1; position: relative; cursor: crosshair; }
        
        /* Panneau de droite (Explorateur & Propriétés) */
        #sidebar { width: 300px; background: var(--panel-bg); border-left: 1px solid var(--border); display: flex; flex-direction: column; }
        .panel { flex: 1; border-bottom: 1px solid var(--border); overflow-y: auto; padding: 10px; }
        h3 { font-size: 12px; text-transform: uppercase; color: #888; margin-bottom: 10px; }
        
        button { background: #444; border: 1px solid #555; color: white; padding: 5px 10px; cursor: pointer; margin-right: 5px; }
        button:hover { background: #555; }
    </style>
</head>
<body>

    <div id="toolbar">
        <button onclick="spawnPart()">Part</button>
        <button onclick="setTool('translate')">Move</button>
        <button onclick="setTool('rotate')">Rotate</button>
        <button onclick="setTool('scale')">Scale</button>
    </div>

    <div id="viewport"></div>

    <div id="sidebar">
        <div class="panel" id="explorer">
            <h3>Explorer</h3>
            <div id="tree"></div>
        </div>
        <div class="panel" id="properties">
            <h3>Properties</h3>
            <div id="props-list">Sélectionnez un objet</div>
        </div>
    </div>

    </body>
</html>
