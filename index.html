<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Web Studio - Mes Projets</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="studio-root">
    <div class="dashboard" style="padding: 50px; max-width: 1000px; margin: auto;">
        <header style="display: flex; justify-content: space-between; align-items: center;">
            <h1>Dashboard</h1>
            <div id="user-profile" style="display: flex; align-items: center; gap: 15px;">
                <span id="user-display-name"></span>
                <button class="tool-btn" onclick="window.logout()">Déconnexion</button>
            </div>
        </header>

        <section style="margin-top: 40px;">
            <button class="btn-primary" style="padding: 15px 30px; background: #0078d4; border: none; color: white; border-radius: 5px; cursor: pointer; font-weight: bold;" onclick="window.createNewProject()">
                + Créer un nouveau projet
            </button>
            
            <div id="project-list" class="project-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; margin-top: 30px;">
                </div>
        </section>
    </div>

    <script type="module">
        import { auth, db } from "./firebase-config.js";
        import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { collection, query, where, getDocs, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // Vérification de session
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "auth.html"; // Redirige vers login si non connecté
            } else {
                document.getElementById('user-display-name').innerText = user.email;
                loadProjects(user.uid);
            }
        });

        window.logout = () => signOut(auth);

        async function loadProjects(uid) {
            const q = query(collection(db, "projects"), where("owner", "==", uid));
            const snap = await getDocs(q);
            const list = document.getElementById('project-list');
            list.innerHTML = '';

            snap.forEach(doc => {
                const p = doc.data();
                const card = document.createElement('div');
                card.className = 'project-card'; // Utilise tes styles de style.css
                card.style.background = '#2d2d2d'; card.style.padding = '20px'; card.style.borderRadius = '8px'; card.style.cursor = 'pointer'; card.style.border = '1px solid #444';
                card.innerHTML = `<h3>${p.name}</h3><p style="color: #888; font-size: 0.8em;">Modifié le: ${p.lastModified?.toDate().toLocaleDateString() || 'Récemment'}</p>`;
                card.onclick = () => window.location.href = `editor/index.html?id=${doc.id}&name=${encodeURIComponent(p.name)}`;
                list.appendChild(card);
            });
        }

        window.createNewProject = async () => {
            const name = prompt("Nom du projet ?") || "Nouveau Projet";
            const docRef = await addDoc(collection(db, "projects"), {
                name: name,
                owner: auth.currentUser.uid,
                lastModified: serverTimestamp(),
                data: []
            });
            window.location.href = `editor/index.html?id=${docRef.id}&name=${encodeURIComponent(name)}`;
        };
    </script>
</body>
</html>
